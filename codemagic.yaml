workflows:
  android-release-workflow:
    name: Android Release Workflow
    max_build_duration: 90
    environment:
      flutter: 3.24.3
      vars:
        EMAIL_RECIPIENT: "kssarras@gmail.com"
      android_signing:
        - videitos_keystore
    scripts:
      - name: Ensure AGP compatibility
        script: |
          if ! grep -q "android.newDsl=false" android/gradle.properties; then
            echo "android.newDsl=false" >> android/gradle.properties
          fi
      - name: Clean Gradle cache
        script: |
          cd android
          ./gradlew clean
          cd ..
      - name: Fix video_compress namespace
        script: |
          PLUGIN_DIR="$HOME/.pub-cache/hosted/pub.dev/video_compress-3.1.4/android"
          if [ -d "$PLUGIN_DIR" ]; then
            cat > "$PLUGIN_DIR/build.gradle" << 'EOF'
    android {
        namespace "com.otaliastudios.compress"
        compileSdk 34

        defaultConfig {
            minSdk 21
            testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        }
    }

    dependencies {
        implementation 'androidx.annotation:annotation:1.2.0'
    }
    EOF
            echo "Patched video_compress build.gradle with namespace."
          else
            echo "Plugin directory not found at $PLUGIN_DIR"
          fi
      - name: Get Flutter packages
        script: flutter packages pub get
      - name: Build AAB with Flutter
        script: |
          flutter build appbundle --release
    artifacts:
      - build/**/outputs/**/*.aab
    publishing:
      email:
        recipients:
          - kssarras@gmail.com
        notify:
          success: true
          failure: true