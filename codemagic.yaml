workflows:
  android-release-workflow:
    name: Android Release Workflow
    max_build_duration: 90
    environment:
      flutter: 3.24.3                     # Versión estable de Flutter
      vars:
        EMAIL_RECIPIENT: "kssarras@gmail.com"
      android_signing:
        - videitos_keystore               # Debe coincidir con el nombre en Code signing
    scripts:
      # 1. Asegurar compatibilidad con AGP 9+ (evita el error "Cannot add task 'generateLockfiles'")
      - name: Ensure AGP compatibility
        script: |
          if ! grep -q "android.newDsl=false" android/gradle.properties; then
            echo "android.newDsl=false" >> android/gradle.properties
          fi
      # 2. Limpiar caché de Gradle (evita conflictos)
      - name: Clean Gradle cache
        script: |
          cd android
          ./gradlew clean
          cd ..
      # 3. Obtener dependencias de Flutter
      - name: Get Flutter packages
        script: flutter packages pub get
      # 4. Construir el Android App Bundle (AAB) firmado
      - name: Build AAB with Flutter
        script: |
          flutter build appbundle --release
    artifacts:
      - build/**/outputs/**/*.aab          # Recoge el AAB generado
    publishing:
      email:
        recipients:
          - kssarras@gmail.com             # Notificaciones al correo
        notify:
          success: true
          failure: true